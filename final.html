<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALXRYT | Script Key</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b011d; }
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .card { 
            background: rgba(15, 4, 31, 0.9); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(168, 85, 247, 0.3); 
            padding: 40px 25px; 
            border-radius: 25px; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.4); 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
        }

        .title { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #a855f7; margin-bottom: 20px; }
        
        .key-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #00ff88;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .key-display {
            color: #00ff88;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            word-break: break-all;
            letter-spacing: 1px;
        }

        .instruction { color: #888; font-size: 11px; margin-bottom: 10px; font-weight: bold; }

        .main-btn { 
            display: block; width: 100%; padding: 18px 0; border: none; border-radius: 15px; 
            font-weight: 900; font-size: 14px; color: white; text-decoration: none; 
            background: linear-gradient(45deg, #6d28d9, #a855f7); 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); cursor: pointer; text-align: center;
        }

        .copy-msg {
            color: #00ff88;
            font-size: 12px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    
    <div class="card">
        <h1 class="title">YOUR SCRIPT KEY</h1>
        <p class="instruction">COPY AND PASTE TO YOUR EXECUTOR</p>
        
        <div class="key-container">
            <span class="key-display" id="keyText">ALXRYT-6729-KEY-X</span>
        </div>

        <button class="main-btn" onclick="copyKey()">COPY KEY</button>
        <p id="copyMsg" class="copy-msg">Copied to Clipboard! ✅</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.stars.min.js"></script>
    <script>
        // Background Stars
        VANTA.STARS({ el: "#space-bg", color: 0xa855f7, backgroundColor: 0x05010c, starSize: 1.5, speed: 1.5 });

        // Copy Function
        function copyKey() {
            const key = document.getElementById('keyText').innerText;
            navigator.clipboard.writeText(key).then(() => {
                const msg = document.getElementById('copyMsg');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 2000);
            });
        }
    </script>
</body>
</html>
