<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALXRYT | Step 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b011d; }
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: rgba(15, 4, 31, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(168, 85, 247, 0.3); padding: 40px 25px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 0 50px rgba(138, 43, 226, 0.4); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .title { font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px #a855f7; margin-bottom: 25px; }
        .step-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(168, 85, 247, 0.2); padding: 15px; border-radius: 15px; margin-bottom: 12px; text-align: left; }
        .step-info p { color: #fff; font-size: 14px; font-weight: 600; margin: 0; }
        .status-text { font-size: 11px; font-weight: bold; color: #888; display: block; margin-top: 2px; }
        .completed-box { border-color: #00ff88 !important; }
        .completed-text { color: #00ff88 !important; }
        .main-btn { display: block; width: 100%; padding: 18px 0; border: none; border-radius: 15px; font-weight: 900; font-size: 14px; color: white; margin-top: 25px; background: linear-gradient(45deg, #6d28d9, #a855f7); cursor: pointer; }
        .main-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #333; }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <div class="card">
        <h1 class="title">STEP 2</h1>
        <div class="step-item completed-box"><div class="step-info"><p>Follow on TikTok</p><span class="status-text completed-text">Completed ✅</span></div></div>
        <div class="step-item" id="box2"><div class="step-info"><p>Join Discord Server</p><span id="stat2" class="status-text">Pending...</span></div></div>
        <button id="btn" class="main-btn" onclick="start()">JOIN DISCORD SERVER</button>
    </div>
    <script>
        function start() {
            window.open("https://discord.gg/7wtsqN29am"); 
            const btn = document.getElementById('btn');
            const stat = document.getElementById('stat2');
            btn.innerText = "VERIFYING (15s)...";
            btn.disabled = true;
            stat.innerText = "Checking server status... ⏳";
            
            // 15 SECONDS DELAY
            setTimeout(() => {
                document.getElementById('box2').className = "step-item completed-box";
                stat.innerText = "Completed ✅";
                stat.className = "status-text completed-text";
                btn.innerText = "FINALIZING...";
                setTimeout(() => { window.location.href = "completed.html"; }, 1500);
            }, 15000);
        }
    </script>
</body>
</html>
