<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALXRYT | All Done</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b011d; }
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: rgba(15, 4, 31, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(168, 85, 247, 0.3); padding: 40px 25px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 0 50px rgba(138, 43, 226, 0.4); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .title { font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px #a855f7; margin-bottom: 25px; }
        
        /* Same style sa mga unang pages */
        .step-item { background: rgba(255, 255, 255, 0.05); border: 1px solid #00ff88; padding: 15px; border-radius: 15px; margin-bottom: 12px; text-align: left; }
        .completed-text { color: #00ff88 !important; font-weight: bold; font-size: 11px; }
        .step-info p { color: #fff; font-size: 14px; font-weight: 600; margin: 0; }

        /* Button size and look: EXACT SAME as index and step2 */
        .main-btn { 
            display: block; width: 100%; padding: 18px 0; border: none; border-radius: 15px; 
            font-weight: 900; font-size: 14px; color: white; text-decoration: none; 
            margin-top: 25px; background: linear-gradient(45deg, #6d28d9, #a855f7); 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); cursor: pointer; text-align: center;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <div class="card">
        <h1 class="title">ALL DONE!</h1>
        <div class="steps-list">
            <div class="step-item"><div class="step-info"><p>Follow on TikTok</p><span class="completed-text">Completed ✅</span></div></div>
            <div class="step-item"><div class="step-info"><p>Join Discord Server</p><span class="completed-text">Completed ✅</span></div></div>
        </div>
        <button class="main-btn" onclick="window.location.href='https://YUNG_LINK_MO_DITO.com'">CLICK HERE TO GET KEY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.stars.min.js"></script>
    <script>
        VANTA.STARS({ el: "#space-bg", color: 0xa855f7, backgroundColor: 0x05010c, starSize: 1.5, speed: 1.5 });
    </script>
</body>
</html>
